<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player - Money Drop</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) ||
                (e.ctrlKey && ['U','u','S','s'].includes(e.key))
            ) {
                e.preventDefault();
                return false;
            }
        });
    </script>
    <style>
        @font-face {
            font-family: 'Myriad Pro';
            src: url('MYRIADPRO-REGULAR.OTF') format('opentype');
        }

        @font-face {
            font-family: 'LHF_Mono';
            src: url('LHF_Mono.otf') format('opentype'), url('LHF Mono.otf') format('opentype');
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            -webkit-user-select: none; -ms-user-select: none; user-select: none;
            font-weight: bold !important;
        }

        body {
            font-family: Arial, sans-serif; background-color: #111; height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
            overflow: hidden; padding: 20px;
        }

        /* Hover effect for ALL buttons */
        button:hover {
            background: #ffa500 !important;
            background-image: none !important;
            color: #ffffff !important;
        }

        /* KHU VỰC CÁC Ô CỬA */
        .doors-container {
            display: flex; justify-content: space-around; width: 100%; gap: 20px; margin-top: 10px;
        }

        .door-wrapper {
            flex: 1; max-width: 280px; display: flex; flex-direction: column; align-items: center; transition: opacity 0.5s;
        }

        .answer-box {
            font-family: 'Myriad Pro', 'MyriadPro', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff; font-size: 16px; font-weight: bold; margin-bottom: 10px;
            background: #27ae60; padding: 8px 16px; border-radius: 4px;
            border: 1px solid #2ecc71; min-height: 44px; display: flex;
            align-items: center; justify-content: center; width: 100%; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: background-color 0.3s;
        }

        .dropped-money-font {
            font-family: 'LHF_Mono', 'LHF Mono', monospace !important;
            font-size: 18px;
            color: #ffff00;
        }

        .door-wrapper.failed .answer-box {
            background: #c0392b !important; border-color: #ff3333 !important;
        }

        .door {
            width: 100%; aspect-ratio: 16 / 9; background-color: #b71c1c;
            border: 3px solid #ffcc00; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            padding: 10px; display: grid; grid-template-columns: repeat(5, 1fr);
            grid-auto-rows: 25px; gap: 4px; overflow-y: auto; cursor: pointer;
            transition: all 0.3s ease;
        }

        .door.drag-over { background-color: #d32f2f; transform: scale(1.03); }
        .door.selected { border-color: #00e676; box-shadow: 0 0 15px #00e676; transform: scale(1.02); }
        
        .door.dropped {
            transform: rotateX(85deg); opacity: 0.1; background-color: #000;
            box-shadow: none; pointer-events: none;
        }

        .bet-control-row {
            display: flex; align-items: center; gap: 8px; width: 100%; margin-top: 10px;
        }

        .bet-control-row .bet-amount {
            margin-top: 0; flex: 1;
        }

        .bet-btn {
            width: 42px; height: 38px; border-radius: 6px; border: none;
            font-size: 22px; font-weight: bold; color: #ffffff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4); transition: all 0.15s ease;
            flex-shrink: 0; user-select: none;
        }

        .bet-btn:active { transform: translateY(2px) scale(0.95); }

        .bet-btn.add-btn {
            background: linear-gradient(135deg, #27ae60, #2ecc71); border: 1px solid #2ecc71;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .bet-btn.sub-btn {
            background: linear-gradient(135deg, #c0392b, #e74c3c); border: 1px solid #ff5252;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .door-wrapper.failed .bet-btn {
            opacity: 0.3; pointer-events: none;
        }

        .bet-amount {
            color: #ffcc00; font-size: 16px; font-weight: bold; margin-top: 10px;
            background: rgba(0, 0, 0, 0.85); padding: 6px 16px; border-radius: 4px;
            border: 1px solid #444; min-height: 34px; display: flex;
            align-items: center; justify-content: center; width: 100%; text-align: center;
        }

        /* KHU VỰC CÂU HỎI */
        .question-container {
            width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 10px 0;
        }

        .question-box {
            background: linear-gradient(135deg, #2c3e50, #34495e); border: 2px solid #7f8c8d;
            border-radius: 12px; padding: 25px 40px; color: #ffffff; font-size: 24px;
            font-weight: bold; text-align: center; max-width: 800px; width: 100%;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6); letter-spacing: 0.5px;
        }

        /* KHU VỰC BÀN TIỀN DƯỚI */
        .table-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; }

        .timer-box {
            background: #222; color: #ff3d00; font-family: 'LHF_Mono', 'LHF Mono', monospace;
            font-size: 28px; font-weight: bold; padding: 6px 24px; border: 3px solid #34495e;
            border-bottom: none; border-radius: 10px 10px 0 0; box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
            text-shadow: 0 0 10px rgba(255, 61, 0, 0.5); z-index: 2; transition: color 0.3s;
        }
        .timer-box.warning { color: #ffff00; text-shadow: 0 0 10px rgba(255, 255, 0, 0.5); }

        .table-container {
            width: 100%; background: #2c3e50; border-top: 6px solid #34495e;
            padding: 15px 20px; border-radius: 12px 12px 0 0; cursor: pointer; position: relative; z-index: 1;
        }

        .table-title { color: #fff; text-align: center; margin-bottom: 15px; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        
        .money-grid { 
            display: grid; 
            grid-template-columns: repeat(20, 1fr); 
            gap: 10px; 
            justify-items: center; 
            min-height: 74px;
        }

        .money-stack { width: 60px; height: 32px; cursor: grab; transition: transform 0.1s; }
        .money-stack img { width: 100%; height: 100%; object-fit: cover; border-radius: 3px; box-shadow: 0 4px 6px rgba(0,0,0,0.4); display: block; pointer-events: none; }
        
        .door .money-stack { width: 100%; height: 100%; cursor: pointer; pointer-events: none; }
    </style>
</head>
<body>

    <div class="doors-container">
        <div class="door-wrapper" id="wrap-1">
            <div class="answer-box" id="ans-txt-1">---</div>
            <div class="door" id="door-1" data-bet="0"></div>
            <div class="bet-control-row">
                <button class="bet-btn sub-btn" onclick="removeMoneyFromDoor(1)">-</button>
                <div class="bet-amount" id="bet-1">0 $A</div>
                <button class="bet-btn add-btn" onclick="addMoneyToDoor(1)">+</button>
            </div>
        </div>
        <div class="door-wrapper" id="wrap-2">
            <div class="answer-box" id="ans-txt-2">---</div>
            <div class="door" id="door-2" data-bet="0"></div>
            <div class="bet-control-row">
                <button class="bet-btn sub-btn" onclick="removeMoneyFromDoor(2)">-</button>
                <div class="bet-amount" id="bet-2">0 $A</div>
                <button class="bet-btn add-btn" onclick="addMoneyToDoor(2)">+</button>
            </div>
        </div>
        <div class="door-wrapper" id="wrap-3">
            <div class="answer-box" id="ans-txt-3">---</div>
            <div class="door" id="door-3" data-bet="0"></div>
            <div class="bet-control-row">
                <button class="bet-btn sub-btn" onclick="removeMoneyFromDoor(3)">-</button>
                <div class="bet-amount" id="bet-3">0 $A</div>
                <button class="bet-btn add-btn" onclick="addMoneyToDoor(3)">+</button>
            </div>
        </div>
        <div class="door-wrapper" id="wrap-4">
            <div class="answer-box" id="ans-txt-4">---</div>
            <div class="door" id="door-4" data-bet="0"></div>
            <div class="bet-control-row">
                <button class="bet-btn sub-btn" onclick="removeMoneyFromDoor(4)">-</button>
                <div class="bet-amount" id="bet-4">0 $A</div>
                <button class="bet-btn add-btn" onclick="addMoneyToDoor(4)">+</button>
            </div>
        </div>
    </div>

    <div class="question-container">
        <div class="question-box" id="question-text">CHỜ MC NẠP CHỦ ĐỀ...</div>
    </div>

    <div class="table-wrapper">
        <div class="timer-box" id="game-timer">01:00</div>
        <div class="table-container" id="table-desk">
            <div class="table-title" id="table-guide">Bàn Tiền (40 cọc = 1.000.000 $A)</div>
            <div class="money-grid" id="money-board"></div>
        </div>
    </div>

    <script>
        const LOCAL_SERVER_URL = "http://localhost:3000";
        const RENDER_SERVER_URL = "https://ddtr-ace.onrender.com";
        const SERVER_URL = (typeof window !== 'undefined' && window.location.protocol.startsWith('http') && window.location.host) 
            ? window.location.origin 
            : RENDER_SERVER_URL;

        class GameSyncChannel {
            constructor(channelName = 'gameshow_money_drop', serverUrl = RENDER_SERVER_URL) {
                this.channelName = channelName;
                this.onmessage = null;
                this.lastMsgId = null;

                if (typeof window !== 'undefined' && window.BroadcastChannel) {
                    try {
                        this.bc = new BroadcastChannel(this.channelName);
                        this.bc.onmessage = (event) => {
                            if (!event || !event.data) return;
                            if (event.data._msgId && event.data._msgId === this.lastMsgId) return;
                            if (event.data._msgId) this.lastMsgId = event.data._msgId;
                            if (typeof this.onmessage === 'function') {
                                this.onmessage(event);
                            }
                        };
                    } catch(e) {
                        console.warn('BroadcastChannel error:', e);
                    }
                }

                let targetUrl = (typeof window !== 'undefined' && window.location.protocol.startsWith('http') && window.location.host)
                    ? window.location.origin 
                    : RENDER_SERVER_URL;

                if (serverUrl && serverUrl.startsWith('http')) {
                    targetUrl = serverUrl;
                }

                try {
                    this.socket = io(targetUrl, {
                        transports: ['websocket', 'polling'],
                        reconnection: true,
                        reconnectionAttempts: Infinity,
                        reconnectionDelay: 1000
                    });

                    this.socket.on('connect', () => {
                        console.log('[Socket.IO Player] Connected to server:', this.socket.id);
                        this.socket.emit('join_room', this.channelName);
                        if (typeof this.onmessage === 'function') {
                            this.onmessage({ data: { action: 'socket_connected', data: { id: this.socket.id } } });
                        }
                    });

                    this.socket.on('game_event', (msg) => {
                        if (!msg) return;
                        if (msg._msgId && msg._msgId === this.lastMsgId) return;
                        if (msg._msgId) this.lastMsgId = msg._msgId;
                        if (typeof this.onmessage === 'function') {
                            this.onmessage({ data: msg });
                        }
                    });

                    this.socket.on('disconnect', () => {
                        console.log('[Socket.IO Player] Disconnected');
                    });
                } catch(e) {
                    console.warn('Socket.IO error:', e);
                }
            }

            postMessage(msg) {
                if (!msg) return;
                if (!msg.room && !msg.topic) {
                    msg.room = this.channelName;
                }
                if (!msg._msgId) {
                    msg._msgId = Math.random().toString(36).substring(2) + Date.now().toString(36);
                }
                this.lastMsgId = msg._msgId;

                if (this.bc) {
                    try { this.bc.postMessage(msg); } catch(e){}
                }
                if (this.socket) {
                    this.socket.emit('game_event', msg);
                }
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const roomIdParam = urlParams.get('roomid');
        const authParam = urlParams.get('auth');

        if (!roomIdParam || !authParam) {
            window.location.href = 'Login.html';
        } else {
            const verifyTargets = [SERVER_URL, LOCAL_SERVER_URL, RENDER_SERVER_URL];
            (async () => {
                for (const target of [...new Set(verifyTargets)]) {
                    try {
                        const baseUrl = target.replace(/\/+$/, '');
                        const res = await fetch(baseUrl + '/api/verify-room', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ roomid: roomIdParam, auth: authParam })
                        });
                        if (res.ok) {
                            const data = await res.json();
                            if (data && data.valid === false) {
                                window.location.href = 'Login.html';
                            }
                            break;
                        }
                    } catch(e) {}
                }
            })();
        }

        const channel = new GameSyncChannel(roomIdParam || 'gameshow_money_drop', SERVER_URL);

        let activeSfxAudio = null;
        let timerAudio = new Audio("SFX/drop_timer.mp3");

        function playSfxOnClient(filePath, loop = false, stopPrevious = true) {
            if (stopPrevious && activeSfxAudio) {
                try {
                    activeSfxAudio.pause();
                    activeSfxAudio.currentTime = 0;
                } catch(e) {}
            }
            const audio = new Audio(filePath);
            audio.loop = loop;
            if (stopPrevious) {
                activeSfxAudio = audio;
            }
            audio.play().catch(e => {
                console.warn("Audio play blocked:", filePath, e);
            });
        }

        function stopAllSfxOnClient() {
            if (activeSfxAudio) {
                try {
                    activeSfxAudio.pause();
                    activeSfxAudio.currentTime = 0;
                } catch(e) {}
                activeSfxAudio = null;
            }
            if (timerAudio) {
                try {
                    timerAudio.pause();
                    timerAudio.currentTime = 0;
                } catch(e) {}
            }
        }

        const moneyBoard = document.getElementById('money-board');
        const tableDesk = document.getElementById('table-desk');
        const doors = document.querySelectorAll('.door');
        const gameTimer = document.getElementById('game-timer');

        const VALUE_PER_STACK = 25000; 
        let selectedDoor = null; 
        let isLock = false; 
        let currentRound = 1;
        const playerTabId = 'player_' + Math.random().toString(36).substring(2, 9);

        // --- MONEY STACK CREATION ---
        function createMoneyStackElement(stackId) {
            const moneyStack = document.createElement('div');
            moneyStack.className = 'money-stack';
            moneyStack.draggable = true;
            moneyStack.id = stackId;
            const img = document.createElement('img');
            img.src = '50$A.png'; 
            img.alt = '50 $A';
            img.onerror = () => {
                img.style.display = 'none';
                moneyStack.style.background = 'linear-gradient(135deg, #f1c40f, #f39c12)';
                moneyStack.style.border = '1px solid #d35400';
                moneyStack.style.borderRadius = '4px';
                moneyStack.style.display = 'flex';
                moneyStack.style.alignItems = 'center';
                moneyStack.style.justifyContent = 'center';
                moneyStack.style.color = '#000';
                moneyStack.style.fontSize = '10px';
                moneyStack.innerText = '25K $A';
            };
            moneyStack.appendChild(img);

            moneyStack.addEventListener('dragstart', (e) => {
                if (isLock) return e.preventDefault();
                if (selectedDoor) { selectedDoor.classList.remove('selected'); selectedDoor = null; }
                e.dataTransfer.setData('text/plain', e.currentTarget.id);
            });
            return moneyStack;
        }

        function getNextFreeStackId() {
            let maxId = 0;
            const allStacks = document.querySelectorAll('.money-stack');
            allStacks.forEach(s => {
                const num = parseInt(s.id.replace('money-', '')) || 0;
                if (num > maxId) maxId = num;
            });
            return `money-${maxId + 1}`;
        }

        function updateTotalMoneyBoardGuide() {
            const allStacks = document.querySelectorAll('.money-stack');
            const totalCount = allStacks.length;
            const totalMoney = totalCount * VALUE_PER_STACK;
            const guideEl = document.getElementById('table-guide');
            if (guideEl) {
                guideEl.innerText = `Bàn Tiền (${totalCount} cọc = ${totalMoney.toLocaleString('vi-VN')} $A)`;
            }
        }

        function addPlayerStacks(count = 1) {
            count = Math.max(1, parseInt(count) || 1);
            for (let i = 0; i < count; i++) {
                const newId = getNextFreeStackId();
                const stackEl = createMoneyStackElement(newId);
                moneyBoard.appendChild(stackEl);
            }
            updateTotalMoneyBoardGuide();
            syncBetsToController();
            broadcastPlayerStackState();
        }

        function removePlayerStacks(count = 1) {
            count = Math.max(1, parseInt(count) || 1);
            let removed = 0;
            while (removed < count) {
                const availableMoney = moneyBoard.querySelector('.money-stack');
                if (availableMoney) {
                    availableMoney.remove();
                    removed++;
                } else {
                    break;
                }
            }
            if (removed < count) {
                for (let i = 4; i >= 1; i--) {
                    const door = document.getElementById(`door-${i}`);
                    if (!door) continue;
                    while (removed < count) {
                        const stackInDoor = door.querySelector('.money-stack');
                        if (stackInDoor) {
                            stackInDoor.remove();
                            removed++;
                            let currentBet = (parseInt(door.getAttribute('data-bet')) || 0) - VALUE_PER_STACK;
                            if (currentBet < 0) currentBet = 0;
                            door.setAttribute('data-bet', currentBet);
                            updateDoorBetDisplay(door);
                        } else {
                            break;
                        }
                    }
                    if (removed >= count) break;
                }
            }
            updateTotalMoneyBoardGuide();
            syncBetsToController();
            broadcastPlayerStackState();
        }

        function setPlayerStacks(targetCount) {
            targetCount = Math.max(0, parseInt(targetCount) || 0);
            const currentStacks = document.querySelectorAll('.money-stack').length;
            if (targetCount > currentStacks) {
                addPlayerStacks(targetCount - currentStacks);
            } else if (targetCount < currentStacks) {
                removePlayerStacks(currentStacks - targetCount);
            } else {
                updateTotalMoneyBoardGuide();
                syncBetsToController();
                broadcastPlayerStackState();
            }
        }

        function broadcastPlayerStackState() {
            const stackLocationMap = {};
            const allStacks = document.querySelectorAll('.money-stack');
            allStacks.forEach(stack => {
                if (stack && stack.parentNode) {
                    stackLocationMap[stack.id] = stack.parentNode.id;
                }
            });
            const bets = {
                b1: parseInt(document.getElementById('door-1').getAttribute('data-bet')) || 0,
                b2: parseInt(document.getElementById('door-2').getAttribute('data-bet')) || 0,
                b3: parseInt(document.getElementById('door-3').getAttribute('data-bet')) || 0,
                b4: parseInt(document.getElementById('door-4').getAttribute('data-bet')) || 0
            };
            channel.postMessage({
                action: 'sync_player_state',
                data: {
                    senderId: playerTabId,
                    stackLocationMap: stackLocationMap,
                    bets: bets,
                    totalStacks: allStacks.length
                }
            });
        }

        function addMoneyToDoor(doorId) {
            if (isLock) return;
            const door = document.getElementById(`door-${doorId}`);
            if (!door || door.classList.contains('dropped')) return;

            const availableMoney = moneyBoard.querySelector('.money-stack');
            if (availableMoney) {
                door.appendChild(availableMoney);
                availableMoney.draggable = false;
                let currentBet = (parseInt(door.getAttribute('data-bet')) || 0) + VALUE_PER_STACK;
                door.setAttribute('data-bet', currentBet);
                updateDoorBetDisplay(door);
                broadcastPlayerStackState();
            }
        }

        function removeMoneyFromDoor(doorId) {
            if (isLock) return;
            const door = document.getElementById(`door-${doorId}`);
            if (!door || door.classList.contains('dropped')) return;

            const moneyInDoor = door.querySelector('.money-stack');
            if (moneyInDoor) {
                moneyBoard.appendChild(moneyInDoor);
                moneyInDoor.draggable = true;
                let currentBet = (parseInt(door.getAttribute('data-bet')) || 0) - VALUE_PER_STACK;
                door.setAttribute('data-bet', currentBet);
                updateDoorBetDisplay(door);
                broadcastPlayerStackState();
            }
        }

        function syncBetsToController() {
            const allStacks = document.querySelectorAll('.money-stack');
            const betData = {
                b1: parseInt(document.getElementById('door-1').getAttribute('data-bet')) || 0,
                b2: parseInt(document.getElementById('door-2').getAttribute('data-bet')) || 0,
                b3: parseInt(document.getElementById('door-3').getAttribute('data-bet')) || 0,
                b4: parseInt(document.getElementById('door-4').getAttribute('data-bet')) || 0,
                totalStacks: allStacks.length,
                totalMoney: allStacks.length * VALUE_PER_STACK
            };
            channel.postMessage({ action: 'sync_bets_to_mc', data: betData });
        }

        // Initialize 40 money stacks
        for (let i = 1; i <= 40; i++) {
            const moneyStack = createMoneyStackElement(`money-${i}`);
            moneyBoard.appendChild(moneyStack);
        }
        updateTotalMoneyBoardGuide();

        function updateDoorBetDisplay(door) {
            const currentBet = parseInt(door.getAttribute('data-bet')) || 0;
            const doorId = door.id.split('-')[1];
            document.getElementById(`bet-${doorId}`).innerText = currentBet.toLocaleString('vi-VN') + ' $A';
            syncBetsToController(); 
        }

        doors.forEach(door => {
            door.addEventListener('click', (e) => {
                e.stopPropagation();
                if(isLock || door.classList.contains('dropped')) return;

                if (selectedDoor && selectedDoor !== door) {
                    const moneyInSelectedDoor = selectedDoor.querySelector('.money-stack');
                    if (moneyInSelectedDoor) {
                        door.appendChild(moneyInSelectedDoor);
                        let oldBet = (parseInt(selectedDoor.getAttribute('data-bet')) || 0) - VALUE_PER_STACK;
                        selectedDoor.setAttribute('data-bet', oldBet); updateDoorBetDisplay(selectedDoor);
                        let newBet = (parseInt(door.getAttribute('data-bet')) || 0) + VALUE_PER_STACK;
                        door.setAttribute('data-bet', newBet); updateDoorBetDisplay(door);
                    }
                    if (parseInt(selectedDoor.getAttribute('data-bet')) === 0) { selectedDoor.classList.remove('selected'); selectedDoor = null; }
                } else if (!selectedDoor && (parseInt(door.getAttribute('data-bet')) || 0) > 0) {
                    selectedDoor = door; door.classList.add('selected');
                } else {
                    if (selectedDoor === door) { door.classList.remove('selected'); selectedDoor = null; }
                    const availableMoney = moneyBoard.querySelector('.money-stack');
                    if (availableMoney) {
                        door.appendChild(availableMoney); availableMoney.draggable = false;
                        let currentBet = (parseInt(door.getAttribute('data-bet')) || 0) + VALUE_PER_STACK;
                        door.setAttribute('data-bet', currentBet); updateDoorBetDisplay(door);
                    }
                }
                broadcastPlayerStackState();
            });

            door.addEventListener('dragover', (e) => { if(!isLock && !door.classList.contains('dropped')) e.preventDefault(); door.classList.add('drag-over'); });
            door.addEventListener('dragleave', () => { door.classList.remove('drag-over'); });
            door.addEventListener('drop', (e) => {
                e.preventDefault(); door.classList.remove('drag-over');
                if(isLock || door.classList.contains('dropped')) return;
                const id = e.dataTransfer.getData('text/plain');
                const draggedElement = document.getElementById(id);
                if (draggedElement && draggedElement.parentNode === moneyBoard) {
                    door.appendChild(draggedElement); draggedElement.draggable = false; 
                    let currentBet = (parseInt(door.getAttribute('data-bet')) || 0) + VALUE_PER_STACK;
                    door.setAttribute('data-bet', currentBet); updateDoorBetDisplay(door);
                    broadcastPlayerStackState();
                }
            });
        });

        tableDesk.addEventListener('click', () => {
            if (selectedDoor) {
                const moneyInDoor = selectedDoor.querySelector('.money-stack');
                if (moneyInDoor) {
                    moneyBoard.appendChild(moneyInDoor); moneyInDoor.draggable = true; 
                    let currentBet = (parseInt(selectedDoor.getAttribute('data-bet')) || 0) - VALUE_PER_STACK;
                    selectedDoor.setAttribute('data-bet', currentBet); updateDoorBetDisplay(selectedDoor);
                }
                if (parseInt(selectedDoor.getAttribute('data-bet')) === 0) { selectedDoor.classList.remove('selected'); selectedDoor = null; }
                broadcastPlayerStackState();
            }
        });

        document.body.addEventListener('click', () => { if (selectedDoor) { selectedDoor.classList.remove('selected'); selectedDoor = null; } });

        channel.onmessage = function(event) {
            if (!event || !event.data) return;
            const { action, data } = event.data;

            switch(action) {
                case 'play_sfx':
                    if (data && data.file) {
                        playSfxOnClient(data.file, !!data.loop, data.stopPrevious !== false);
                    }
                    break;

                case 'stop_sfx':
                    stopAllSfxOnClient();
                    break;

                case 'timer_control':
                    if (data && data.status === 'start') {
                        stopAllSfxOnClient();
                        try {
                            timerAudio.currentTime = 0;
                            timerAudio.play().catch(e => {});
                        } catch(e) {}
                    } else if (data && (data.status === 'stop' || data.status === 'timeout')) {
                        if (timerAudio) {
                            try {
                                timerAudio.pause();
                                timerAudio.currentTime = 0;
                            } catch(e) {}
                        }
                    }
                    break;

                case 'socket_connected':
                case 'mqtt_connected':
                    channel.postMessage({ action: 'request_player_state', senderId: playerTabId });
                    break;

                case 'request_player_state':
                    if (data.senderId !== playerTabId) {
                        broadcastPlayerStackState();
                    }
                    break;

                case 'add_player_stacks':
                    addPlayerStacks(data ? (parseInt(data.count) || 1) : 1);
                    break;

                case 'remove_player_stacks':
                    removePlayerStacks(data ? (parseInt(data.count) || 1) : 1);
                    break;

                case 'set_player_stacks':
                    setPlayerStacks(data ? (parseInt(data.count) || 0) : 0);
                    break;

                case 'penalty_fine':
                    removePlayerStacks(1);
                    break;

                case 'sync_player_state':
                    if (data.senderId === playerTabId) break;
                    
                    if (data.stackLocationMap) {
                        const targetLocationMap = data.stackLocationMap;
                        const currentLocalStacks = document.querySelectorAll('.money-stack');
                        currentLocalStacks.forEach(stack => {
                            if (!targetLocationMap[stack.id]) {
                                stack.remove();
                            }
                        });

                        Object.keys(targetLocationMap).forEach(stackId => {
                            const targetId = targetLocationMap[stackId];
                            const targetElem = document.getElementById(targetId);
                            if (targetElem) {
                                let stack = document.getElementById(stackId);
                                if (!stack) {
                                    stack = createMoneyStackElement(stackId);
                                }
                                if (stack.parentNode !== targetElem) {
                                    targetElem.appendChild(stack);
                                    stack.draggable = (targetId === 'money-board');
                                }
                            }
                        });
                        updateTotalMoneyBoardGuide();
                    }

                    if (data.bets) {
                        for (let i = 1; i <= 4; i++) {
                            const d = document.getElementById(`door-${i}`);
                            if (d) {
                                const betVal = data.bets[`b${i}`] || 0;
                                d.setAttribute('data-bet', betVal);
                                const betEl = document.getElementById(`bet-${i}`);
                                if (betEl) betEl.innerText = betVal.toLocaleString('vi-VN') + ' $A';
                            }
                        }
                        syncBetsToController();
                    }
                    break;

                case 'show_topics':
                    document.getElementById('question-text').innerHTML = `LỰA CHỌN CHỦ ĐỀ:<br><br> ${data.topicA} <br>HOẶC<br> ${data.topicB}`;
                    break;
                
                case 'lock_topic':
                    document.getElementById('question-text').innerText = `CHỦ ĐỀ ĐƯỢC CHỌN: ${data.topicName.toUpperCase()}`;
                    break;

                case 'update_single_answer':
                    if (document.getElementById(`ans-txt-${data.id}`)) {
                        const aEl = document.getElementById(`ans-txt-${data.id}`);
                        aEl.innerText = data.text;
                        aEl.classList.remove('dropped-money-font');
                    }
                    break;

                case 'update_content':
                    if(data.type === 'question') {
                        document.getElementById('question-text').innerText = data.data.question;
                    }
                    break;

                case 'change_round':
                    if (data.roundNum) {
                        currentRound = parseInt(data.roundNum);
                    } else {
                        currentRound = parseInt(data.round) || 1;
                    }
                    document.getElementById('wrap-4').style.display = (data.round == '1') ? 'flex' : 'none';
                    document.getElementById('wrap-3').style.display = (data.round == '1' || data.round == '5') ? 'flex' : 'none';
                    break;

                case 'timer_control':
                    if(data.status==="start"){
                        isLock=false;
                        document.getElementById("table-guide").innerText="THỜI GIAN ĐANG CHẠY!";
                    }

                    if(data.status==="add30"){
                        isLock=false;
                        document.getElementById("table-guide").innerText="ĐƯỢC CỘNG THÊM 30 GIÂY";
                    }

                    if(data.status==="stop" || data.status==="timeout"){
                        isLock=true;
                    }

                    formatTimer(data.time);
                    break;

                case 'timer_tick':
                    formatTimer(data.time);
                    break;

                case 'open_door':
                    const dWrap = document.getElementById(`wrap-${data.doorId}`);
                    const door = document.getElementById(`door-${data.doorId}`);
                    const betBox = document.getElementById(`bet-${data.doorId}`);
                    const ansBox = document.getElementById(`ans-txt-${data.doorId}`);
                    
                    if(door && dWrap) {
                        const currentBet = parseInt(door.getAttribute('data-bet')) || 0;
                        door.classList.add('dropped');
                        dWrap.classList.add('failed'); 
                        if (currentBet > 0) {
                            ansBox.innerText = `${currentBet.toLocaleString('vi-VN')} $A ĐÃ RƠI`;
                            ansBox.classList.add('dropped-money-font');
                        } else {
                            ansBox.innerText = "ĐÃ RƠI HẾT TIỀN";
                            ansBox.classList.remove('dropped-money-font');
                        }
                        betBox.style.visibility = 'hidden';
                        door.innerHTML = '';
                        door.setAttribute('data-bet', '0');
                        syncBetsToController(); 
                        broadcastPlayerStackState();
                    }
                    break;

                case 'collect_winning':
                    doors.forEach(d => {
                        if (!d.classList.contains('dropped')) {
                            const remainingStacks = d.querySelectorAll('.money-stack');
                            remainingStacks.forEach(stack => {
                                moneyBoard.appendChild(stack); 
                                stack.draggable = true;       
                            });
                            d.setAttribute('data-bet', '0');
                            updateDoorBetDisplay(d);
                        }
                    });
                    document.getElementById('table-guide').innerText = "ĐÃ HOÀN TIỀN THẮNG VỀ BÀN TIỀN CHUẨN BỊ CHO VÒNG TIẾP THEO!";
                    syncBetsToController();
                    broadcastPlayerStackState();
                    break;

                case 'reset_round':
                    isLock = true;
                    gameTimer.innerText = "01:00";
                    gameTimer.classList.remove('warning');
                    document.getElementById('table-guide').innerText = "Vui lòng đợi lệnh của MC";
                    document.getElementById('question-text').innerText = "CHỜ MC NẠP CHỦ ĐỀ...";
                    
                    const allStacks = document.querySelectorAll('.money-stack');
                    allStacks.forEach(stack => {
                        moneyBoard.appendChild(stack);
                        stack.draggable = true;
                    });

                    doors.forEach(d => {
                        d.classList.remove('dropped');
                        d.setAttribute('data-bet', '0');
                        const dId = d.id.split('-')[1];
                        document.getElementById(`bet-${dId}`).style.visibility = 'visible';
                        document.getElementById(`bet-${dId}`).innerText = "0 $A";
                        const aBox = document.getElementById(`ans-txt-${dId}`);
                        aBox.innerText = "---";
                        aBox.classList.remove('dropped-money-font');
                        document.getElementById(`wrap-${dId}`).classList.remove('failed');
                    });
                    syncBetsToController();
                    broadcastPlayerStackState();
                    break;
            }
        };

        function formatTimer(timeLeft) {
            if(!timeLeft && timeLeft !== 0) return;
            let m = Math.floor(timeLeft / 60); 
            let s = timeLeft % 60;
            gameTimer.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            checkInitialAuth();
            setInterval(() => {
                const overlay = document.getElementById('pin-lock-overlay');
                if (overlay && overlay.style.display !== 'none') {
                    channel.postMessage({ action: 'request_pin' });
                }
            }, 2000);
        });
    </script>
</body>
</html>
