<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Answer</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) ||
                (e.ctrlKey && ['U','u','S','s'].includes(e.key))
            ) {
                e.preventDefault();
                return false;
            }
        });
    </script>
    <style>
        @font-face {
            font-family: 'Myriad Pro';
            src: url('MYRIADPRO-REGULAR.OTF') format('opentype');
        }

        @font-face {
            font-family: 'LHF_Mono';
            src: url('LHF_Mono.otf') format('opentype'), url('LHF Mono.otf') format('opentype');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-weight: bold !important;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* KHU VỰC CHỨA CÁC Ô CỬA LỚN */
        .doors-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            max-width: 1920px;
            gap: 30px;
        }

        /* KHUNG CHỨA CỬA LỚN (MAX-WIDTH 480PX) */
        .door-wrapper {
            flex: 1;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* TỶ LỆ CỦA Ô CỬA (4:2.6) */
        .door-frame {
            width: 100%;
            aspect-ratio: 4 / 2.6;
            position: relative;
            border: none;
            border-radius: 6px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
        }

        /* Ô TRẮNG NHỎ BÊN DƯỚI ĐÁY CỦA CỬA ĐỎ CHỨA SỐ TIỀN CƯỢC */
        .bet-info-box {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            height: 38px;
            background: #ffffff;
            border: 2px solid #111111;
            border-radius: 6px;
            color: #000000;
            font-size: 22px;
            font-weight: 900 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'LHF_Mono', 'LHF Mono', monospace;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 10px;
            letter-spacing: 0.5px;
            z-index: 20;
            transition: all 0.3s ease;
        }

        /* LỚP PHỦ CHO Ô CỬA KHÔNG SỬ DỤNG (ĐÈ UNUSEDOOR.PNG) */
        .unused-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('unusedoor.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: 10;
            display: none;
            pointer-events: auto;
        }

        .unused-overlay.active {
            display: block;
        }

        /* LỚP NỀN ĐÁY (MẶC ĐỊNH LÀ INDOOR.PNG) */
        .bottom-bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('indoor.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: 1;
            transition: background-image 0.2s ease;
        }

        /* ĐỔI SANG DROPDOOR.PNG KHI SẬP */
        .bottom-bg-layer.collapsed-bg {
            background-image: url('dropdoor.png') !important;
        }

        /* TEXT ĐÁP ÁN TRÊN NỀN INDOOR.PNG */
        .answer-text-inside {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            color: #ffffff;
            font-family: 'Myriad Pro', 'MyriadPro', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-shadow: 0 3px 6px rgba(0, 0, 0, 1), 0 0 15px rgba(0, 0, 0, 0.8);
            z-index: 2;
            opacity: 0;
            transform: scale(0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            word-break: break-word;
            line-height: 1.3;
        }

        .answer-text-inside.show {
            opacity: 1;
            transform: scale(1);
        }

        .answer-text-inside.hide-on-drop {
            opacity: 0 !important;
            transform: scale(0.3) !important;
            transition: all 0.2s ease !important;
        }

        /* CHỮ BÁO TIỀN RƠI CĂN GIỮA ĐỒNG ĐỀU */
        .fall-status-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ff3333;
            font-size: 26px;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            line-height: 1.3;
            z-index: 2;
            text-shadow: 0 2px 4px #000, 0 0 10px #000, 0 0 20px #000;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            font-family: 'LHF_Mono', 'LHF Mono', monospace;
        }

        .fall-status-text.active {
            opacity: 1;
        }

        /* LỚP BỀ MẶT CỬA DOOR.PNG */
        .door-surface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            display: flex;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .door-wing {
            width: 50%;
            height: 100%;
            background-size: 200% 100%;
            background-position: left center;
            background-image: url('door.png');
            transition: background-image 0.2s ease;
            background-repeat: no-repeat;
        }

        .door-wing.right {
            background-position: right center;
        }

        /* Wipe mở cánh cửa */
        .door-surface.wiped .door-wing.left {
            transform: translateX(-100%);
        }

        .door-surface.wiped .door-wing.right {
            transform: translateX(100%);
        }

        /* Khép cửa sập 1s */
        .door-surface.closing {
            transition: transform 1s ease-in-out !important;
        }

        .door-surface.closing .door-wing {
            transform: translateX(0) !important;
        }

        /* Ẩn bề mặt khi sập hố */
        .door-surface.dropped {
            display: none;
        }

        /* Đổi ảnh moneydoor.png */
        .bg-moneydoor {
            background-image: url('moneydoor.png') !important;
        }
    </style>
</head>

<body>

    <div class="doors-container">
        <div class="door-wrapper" id="ans-wrap-1">
            <div class="door-frame">
                <div class="unused-overlay" id="unused-1"></div>
                <div class="bottom-bg-layer" id="bg-layer-1"></div>
                <div class="answer-text-inside" id="inside-txt-1"></div>
                <div class="fall-status-text" id="fall-txt-1"></div>
                <div class="door-surface" id="surface-1">
                    <div class="door-wing left" id="wing-l-1"></div>
                    <div class="door-wing right" id="wing-r-1"></div>
                </div>
                <div class="bet-info-box" id="bet-box-1">0 $A</div>
            </div>
        </div>

        <div class="door-wrapper" id="ans-wrap-2">
            <div class="door-frame">
                <div class="unused-overlay" id="unused-2"></div>
                <div class="bottom-bg-layer" id="bg-layer-2"></div>
                <div class="answer-text-inside" id="inside-txt-2"></div>
                <div class="fall-status-text" id="fall-txt-2"></div>
                <div class="door-surface" id="surface-2">
                    <div class="door-wing left" id="wing-l-2"></div>
                    <div class="door-wing right" id="wing-r-2"></div>
                </div>
                <div class="bet-info-box" id="bet-box-2">0 $A</div>
            </div>
        </div>

        <div class="door-wrapper" id="ans-wrap-3">
            <div class="door-frame">
                <div class="unused-overlay" id="unused-3"></div>
                <div class="bottom-bg-layer" id="bg-layer-3"></div>
                <div class="answer-text-inside" id="inside-txt-3"></div>
                <div class="fall-status-text" id="fall-txt-3"></div>
                <div class="door-surface" id="surface-3">
                    <div class="door-wing left" id="wing-l-3"></div>
                    <div class="door-wing right" id="wing-r-3"></div>
                </div>
                <div class="bet-info-box" id="bet-box-3">0 $A</div>
            </div>
        </div>

        <div class="door-wrapper" id="ans-wrap-4">
            <div class="door-frame">
                <div class="unused-overlay" id="unused-4"></div>
                <div class="bottom-bg-layer" id="bg-layer-4"></div>
                <div class="answer-text-inside" id="inside-txt-4"></div>
                <div class="fall-status-text" id="fall-txt-4"></div>
                <div class="door-surface" id="surface-4">
                    <div class="door-wing left" id="wing-l-4"></div>
                    <div class="door-wing right" id="wing-r-4"></div>
                </div>
                <div class="bet-info-box" id="bet-box-4">0 $A</div>
            </div>
        </div>
    </div>

    <script>
        const LOCAL_SERVER_URL = "http://localhost:3000";
        const RENDER_SERVER_URL = "https://ddtr-ace.onrender.com";
        const SERVER_URL = (typeof window !== 'undefined' && window.location.protocol.startsWith('http') && window.location.host) 
            ? window.location.origin 
            : RENDER_SERVER_URL;

        class GameSyncChannel {
            constructor(channelName = 'gameshow_money_drop', serverUrl = RENDER_SERVER_URL) {
                this.channelName = channelName;
                this.onmessage = null;
                this.lastMsgId = null;

                if (typeof window !== 'undefined' && window.BroadcastChannel) {
                    try {
                        this.bc = new BroadcastChannel(this.channelName);
                        this.bc.onmessage = (event) => {
                            if (!event || !event.data) return;
                            if (event.data._msgId && event.data._msgId === this.lastMsgId) return;
                            if (event.data._msgId) this.lastMsgId = event.data._msgId;
                            if (typeof this.onmessage === 'function') {
                                this.onmessage(event);
                            }
                        };
                    } catch(e) {
                        console.warn('BroadcastChannel error:', e);
                    }
                }

                let targetUrl = (typeof window !== 'undefined' && window.location.protocol.startsWith('http') && window.location.host)
                    ? window.location.origin 
                    : RENDER_SERVER_URL;

                if (serverUrl && serverUrl.startsWith('http')) {
                    targetUrl = serverUrl;
                }

                try {
                    this.socket = io(targetUrl, {
                        transports: ['websocket', 'polling'],
                        reconnection: true,
                        reconnectionAttempts: Infinity,
                        reconnectionDelay: 1000
                    });

                    this.socket.on('connect', () => {
                        console.log('[Socket.IO Answer] Connected to server:', this.socket.id);
                        this.socket.emit('join_room', this.channelName);
                        if (typeof this.onmessage === 'function') {
                            this.onmessage({ data: { action: 'socket_connected', data: { id: this.socket.id } } });
                        }
                    });

                    this.socket.on('game_event', (msg) => {
                        if (!msg) return;
                        if (msg._msgId && msg._msgId === this.lastMsgId) return;
                        if (msg._msgId) this.lastMsgId = msg._msgId;
                        if (typeof this.onmessage === 'function') {
                            this.onmessage({ data: msg });
                        }
                    });

                    this.socket.on('disconnect', () => {
                        console.log('[Socket.IO Answer] Disconnected');
                    });
                } catch(e) {
                    console.warn('Socket.IO error:', e);
                }
            }

            postMessage(msg) {
                if (!msg) return;
                if (!msg.room && !msg.topic) {
                    msg.room = this.channelName;
                }
                if (!msg._msgId) {
                    msg._msgId = Math.random().toString(36).substring(2) + Date.now().toString(36);
                }
                this.lastMsgId = msg._msgId;

                if (this.bc) {
                    try { this.bc.postMessage(msg); } catch(e){}
                }
                if (this.socket) {
                    this.socket.emit('game_event', msg);
                }
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const roomParam = urlParams.get('roomid');

        if (!roomParam || !roomParam.trim()) {
            document.addEventListener('DOMContentLoaded', () => {
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:#0d1117;color:#ff4d4d;font-size:24px;font-weight:bold;display:flex;justify-content:center;align-items:center;z-index:999999;text-align:center;padding:20px;';
                overlay.innerText = 'Bổ sung tham số ?roomid=Mã phòng vào link.';
                document.body.appendChild(overlay);
            });
        }

        const channel = new GameSyncChannel(roomParam || 'gameshow_money_drop', SERVER_URL);
        let currentBets = { b1: 0, b2: 0, b3: 0, b4: 0 };
        let activeRound = 1;

        let activeSfxAudio = null;
        let timerAudio = new Audio("SFX/drop_timer.mp3");

        function playSfxOnClient(filePath, loop = false, stopPrevious = true) {
            if (stopPrevious && activeSfxAudio) {
                try {
                    activeSfxAudio.pause();
                    activeSfxAudio.currentTime = 0;
                } catch(e) {}
            }
            const audio = new Audio(filePath);
            audio.loop = loop;
            if (stopPrevious) {
                activeSfxAudio = audio;
            }
            audio.play().catch(e => {
                console.warn("Audio play blocked:", filePath, e);
            });
        }

        function stopAllSfxOnClient() {
            if (activeSfxAudio) {
                try {
                    activeSfxAudio.pause();
                    activeSfxAudio.currentTime = 0;
                } catch(e) {}
                activeSfxAudio = null;
            }
            if (timerAudio) {
                try {
                    timerAudio.pause();
                    timerAudio.currentTime = 0;
                } catch(e) {}
            }
        }

        function setUnusedStatus(doorId, isUnused) {
            const overlay = document.getElementById(`unused-${doorId}`);
            const betBox = document.getElementById(`bet-box-${doorId}`);
            if (overlay) {
                if (isUnused) {
                    overlay.classList.add('active');
                    if (betBox) betBox.style.visibility = 'hidden';
                } else {
                    overlay.classList.remove('active');
                    if (betBox) betBox.style.visibility = 'visible';
                }
            }
        }

        function updateBetDisplays() {
            for (let i = 1; i <= 4; i++) {
                const betVal = currentBets[`b${i}`] || 0;
                const betBox = document.getElementById(`bet-box-${i}`);
                if (betBox) {
                    betBox.innerText = `${betVal.toLocaleString('vi-VN')} $A`;
                }

                const textEl = document.getElementById(`fall-txt-${i}`);
                if (textEl && textEl.classList.contains('active')) {
                    if (betVal > 0) {
                        textEl.innerHTML = `${betVal.toLocaleString('vi-VN')} $A <br> ĐÃ RƠI`;
                    } else {
                        textEl.innerHTML = `ĐÃ RƠI`;
                    }
                }
            }
        }

        channel.onmessage = function (event) {
            if (!event || !event.data) return;
            const { action, data } = event.data;

            switch (action) {
                case 'play_sfx':
                    if (data && data.file) {
                        playSfxOnClient(data.file, !!data.loop, data.stopPrevious !== false);
                    }
                    break;

                case 'stop_sfx':
                    stopAllSfxOnClient();
                    break;

                case 'timer_control':
                    if (data && data.status === 'start') {
                        stopAllSfxOnClient();
                        try {
                            timerAudio.currentTime = 0;
                            timerAudio.play().catch(e => {});
                        } catch(e) {}
                    } else if (data && (data.status === 'stop' || data.status === 'timeout')) {
                        if (timerAudio) {
                            try {
                                timerAudio.pause();
                                timerAudio.currentTime = 0;
                            } catch(e) {}
                        }
                    }
                    break;

                case 'sync_bets_to_mc':
                    if (!data) break;
                    currentBets.b1 = data.b1 || 0;
                    currentBets.b2 = data.b2 || 0;
                    currentBets.b3 = data.b3 || 0;
                    currentBets.b4 = data.b4 || 0;
                    updateBetDisplays();
                    break;

                case 'sync_player_state':
                    if (data && data.bets) {
                        currentBets.b1 = data.bets.b1 || 0;
                        currentBets.b2 = data.bets.b2 || 0;
                        currentBets.b3 = data.bets.b3 || 0;
                        currentBets.b4 = data.bets.b4 || 0;
                        updateBetDisplays();
                    }
                    break;

                case 'update_single_answer':
                    if (!data) break;
                    let targetDoorId = data.id;

                    if (activeRound === 8) {
                        if (data.id === 1) targetDoorId = 2;
                        else if (data.id === 2) targetDoorId = 3;
                        else targetDoorId = null;
                    }

                    if (targetDoorId) {
                        const insideTxt = document.getElementById(`inside-txt-${targetDoorId}`);
                        if (insideTxt) {
                            insideTxt.innerText = data.text;
                            insideTxt.classList.remove('hide-on-drop');
                            insideTxt.classList.add('show');
                        }

                        const surfaceEl = document.getElementById(`surface-${targetDoorId}`);
                        if (surfaceEl) {
                            surfaceEl.classList.add('wiped');
                        }
                    }
                    break;

                case 'change_round':
                    if (!data) break;
                    activeRound = parseInt(data.round);

                    for (let i = 1; i <= 4; i++) {
                        setUnusedStatus(i, false);
                    }

                    if (activeRound >= 5 && activeRound <= 7) {
                        setUnusedStatus(4, true);
                    } else if (activeRound === 8) {
                        setUnusedStatus(1, true);
                        setUnusedStatus(4, true);
                    }
                    break;

                case 'open_door':
                    if (!data) break;
                    let doorId = data.doorId;
                    if (activeRound === 8) {
                        if (data.doorId === 1) doorId = 2;
                        else if (data.doorId === 2) doorId = 3;
                        else doorId = null;
                    }
                    if (!doorId) break;

                    const surface = document.getElementById(`surface-${doorId}`);
                    const fallTxt = document.getElementById(`fall-txt-${doorId}`);
                    const bgLayer = document.getElementById(`bg-layer-${doorId}`);
                    const insideText = document.getElementById(`inside-txt-${doorId}`);

                    if (insideText) {
                        insideText.classList.remove('show');
                        insideText.classList.add('hide-on-drop');
                    }

                    if (surface) {
                        surface.classList.add('closing');
                        surface.classList.remove('wiped');

                        setTimeout(() => {
                            surface.classList.remove('closing');
                            surface.classList.add('dropped');
                            if (bgLayer) bgLayer.classList.add('collapsed-bg');

                            const droppedBetBox = document.getElementById(`bet-box-${doorId}`);
                            if (droppedBetBox) droppedBetBox.style.visibility = 'hidden';

                            if (fallTxt) {
                                const betVal = currentBets[`b${data.doorId}`] || 0;
                                if (betVal > 0) {
                                    fallTxt.innerHTML = `${betVal.toLocaleString('vi-VN')} $A <br> ĐÃ RƠI`;
                                } else {
                                    fallTxt.innerHTML = `ĐÃ RƠI`;
                                }
                                fallTxt.classList.add('active');
                            }
                        }, 1000);
                    }
                    break;

                case 'reset_round':
                    currentBets = { b1: 0, b2: 0, b3: 0, b4: 0 };
                    for (let i = 1; i <= 4; i++) {
                        const wingL = document.getElementById(`wing-l-${i}`);
                        if (wingL) wingL.classList.remove('bg-moneydoor');
                        const wingR = document.getElementById(`wing-r-${i}`);
                        if (wingR) wingR.classList.remove('bg-moneydoor');

                        const surfaceReset = document.getElementById(`surface-${i}`);
                        if (surfaceReset) surfaceReset.className = "door-surface";

                        const bgLyr = document.getElementById(`bg-layer-${i}`);
                        if (bgLyr) bgLyr.classList.remove('collapsed-bg');

                        const insideReset = document.getElementById(`inside-txt-${i}`);
                        if (insideReset) {
                            insideReset.className = "answer-text-inside";
                            insideReset.innerText = "";
                        }

                        const fallT = document.getElementById(`fall-txt-${i}`);
                        if (fallT) {
                            fallT.classList.remove('active');
                            fallT.innerHTML = "";
                        }

                        const betBox = document.getElementById(`bet-box-${i}`);
                        if (betBox) {
                            betBox.innerText = "0 $A";
                            betBox.style.visibility = "visible";
                        }

                        setUnusedStatus(i, false);
                    }
                    break;
            }
        };
    </script>
</body>

</html>
